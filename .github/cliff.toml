[remote.github]
owner = "JamesChan21"
repo = "codex-probe"

[changelog]
header = """
# 更新日志
"""

body = """
{%- macro canonical_username(username="", author_name="") -%}
    {%- set u = username | lower -%}
    {%- set a = author_name | lower -%}

    {# 可维护的 alias 列表 #}
    {%- set aliases = [
        "jameschan21",
        "james_chan21",
        "james-chan21",
        "jc21"
    ] -%}

    {%- if u in aliases or a in aliases -%}
        {{ remote.github.owner }}
    {%- elif username and username | length > 0 -%}
        {{ username }}
    {%- elif author_name and author_name | length > 0 -%}
        {{ author_name }}
    {%- else -%}
        {{ remote.github.owner }}
    {%- endif -%}
{%- endmacro -%}

{% macro github_mention(commit) -%}
    @{{ self::canonical_username(
        username=commit.github.username | default(value=""),
        author_name=commit.author.name | default(value="")
    ) }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
      {% if commit.breaking %}[**breaking**] {% endif %}\
      {{ commit.message | split(pat="\n") | first | upper_first }} \
      {{ self::github_mention(commit=commit) }}
{%- endmacro -%}

{% if version %}\
## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
## 未发布
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits | filter(attribute="scope") | sort(attribute="scope") %}
{{ self::print_commit(commit=commit) }}
{%- endfor %}

{% for commit in commits %}
{%- if not commit.scope -%}
{{ self::print_commit(commit=commit) }}
{% endif -%}
{%- endfor %}

{% endfor -%}
"""

footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false

commit_parsers = [
    { message = ".*\\[skip changelog\\].*", skip = true },
    { body = ".*\\[skip changelog\\].*", skip = true },

    { message = "^feat", group = "<!-- 0 -->✨ 新功能" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug修复" },
    { message = "^refactor", group = "<!-- 2 -->🚜 代码重构" },
    { message = "^perf", group = "<!-- 3 -->🚀 性能优化" },
    { message = "^docs", group = "<!-- 4 -->📚 文档" },
    { message = "^style", group = "<!-- 5 -->🎨 样式" },
    { message = "^test", group = "<!-- 6 -->🧪 测试" },
    { message = "^ci", group = "<!-- 7 -->⚙️ 持续集成" },
    { message = "^chore\\(deps\\)", group = "📦 依赖更新" },
    { message = "^chore", group = "<!-- 8 -->🔧 日常维护" },
    { body = ".*security", group = "<!-- 9 -->🔒 安全" },
    { message = "^revert", group = "<!-- 10 -->◀️ 撤销" },
]

ignore_tags = "rc"
sort_commits = "oldest"

[git.github]
commits = true
